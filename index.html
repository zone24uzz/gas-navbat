<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaz Queue App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 font-sans text-gray-800 pb-20">

  <!-- Header -->
  <header class="bg-gradient-to-r from-blue-600 to-green-500 text-white shadow-lg">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <!-- Logo / Title -->
      <div class="flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 10h2l1 2h13l1-2h2M5 10V6a1 1 0 011-1h3m4 0h3a1 1 0 011 1v4M9 5V3m6 2V3" />
        </svg>
        <span class="text-xl font-bold tracking-tight">GazQueue</span>
      </div>
      <!-- Nav Buttons -->
      <div class="flex items-center gap-2">
        <a href="./register.html"
          class="px-4 py-2 rounded-lg border border-white/60 text-white text-sm font-medium hover:bg-white/70 hover:text-black/300  transition">
          Login
        </a>
      </div>
    </div>

    <!-- Hero Text -->
    <div class="max-w-4xl mx-auto px-4 py-8 text-center">
      <h1 class="text-3xl md:text-5xl font-bold mb-3 drop-shadow">Navbat kutmang — gazni oson oling</h1>
      <p class="text-lg md:text-xl text-white/85">Online navbat, yaqin AЗС, va bildirishnomalar bilan</p>
    </div>
  </header>

  <div class="max-w-4xl mx-auto px-4 py-6 space-y-6">

    <!-- Map Section -->
    <section class="bg-white rounded-2xl shadow-md overflow-hidden">
      <!-- Map Header -->
      <div class="px-6 py-4 flex items-center justify-between border-b border-gray-100">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-green-400 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </div>
          <h2 class="text-lg font-bold text-gray-800">Yaqin AЗС xaritasi</h2>
        </div>
        <span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full">Toshkent</span>
      </div>

      <!-- Map iframe -->
      <div class="relative w-full h-72">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d11383.87472012043!2d69.31040517087065!3d41.371586244405556!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1z0JDQl9Ch!5e1!3m2!1sru!2s!4v1773857761710!5m2!1sru!2s"
          class="w-full h-full border-0" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>

      <!-- Map Footer Stats -->
      <div class="grid grid-cols-3 divide-x divide-gray-100 border-t border-gray-100">
        <div class="flex flex-col items-center py-3 gap-0.5">
          <span class="text-lg font-bold text-blue-600">3</span>
          <span class="text-xs text-gray-500">Yaqin AЗС</span>
        </div>
        <div class="flex flex-col items-center py-3 gap-0.5">
          <span id="nearest-dist" class="text-lg font-bold text-green-600">—</span>
          <span class="text-xs text-gray-500">Eng yaqin</span>
        </div>
        <div class="flex flex-col items-center py-3 gap-0.5">
          <span id="nearest-time" class="text-lg font-bold text-orange-500">—</span>
          <span class="text-xs text-gray-500">Yo'l vaqti</span>
        </div>
      </div>
    </section>

    <!-- Main Action Buttons -->
    <div class="grid grid-cols-2 gap-4">
      <button
        class="bg-blue-500 hover:bg-blue-600 active:scale-95 text-white font-bold py-6 rounded-2xl shadow-md flex flex-col items-center justify-center gap-2 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
        <span class="text-base">Online Navbat</span>
      </button>
      <button id="btn-nearest-azs"
        class="bg-green-500 hover:bg-green-600 active:scale-95 text-white font-bold py-6 rounded-2xl shadow-md flex flex-col items-center justify-center gap-2 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <span class="text-base">Yaqin AЗС</span>
      </button>
      <button
        class="bg-indigo-500 hover:bg-indigo-600 active:scale-95 text-white font-bold py-6 rounded-2xl shadow-md flex flex-col items-center justify-center gap-2 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        <span class="text-base">Mening Navbatim</span>
      </button>
      <button
        class="bg-teal-500 hover:bg-teal-600 active:scale-95 text-white font-bold py-6 rounded-2xl shadow-md flex flex-col items-center justify-center gap-2 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        <span class="text-base">Bildirishnomalar</span>
      </button>
    </div>

    <!-- Queue Status -->
    <section class="bg-white p-6 rounded-2xl shadow-md">
      <h2 class="text-xl font-bold text-gray-800 mb-4">Navbat holati</h2>
      <div class="space-y-3">
        <div class="flex justify-between items-center p-3 bg-blue-50 rounded-xl">
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-blue-500 inline-block"></span>
            <span class="font-semibold text-gray-700">Gaz Station 1</span>
          </div>
          <span class="text-blue-600 font-bold bg-blue-100 px-3 py-1 rounded-full text-sm">5 ta mashina</span>
        </div>
        <div class="flex justify-between items-center p-3 bg-green-50 rounded-xl">
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span>
            <span class="font-semibold text-gray-700">Gaz Station 2</span>
          </div>
          <span class="text-green-600 font-bold bg-green-100 px-3 py-1 rounded-full text-sm">2 ta mashina</span>
        </div>
        <div class="flex justify-between items-center p-3 bg-orange-50 rounded-xl">
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-orange-500 inline-block"></span>
            <span class="font-semibold text-gray-700">Gaz Station 3</span>
          </div>
          <span class="text-orange-600 font-bold bg-orange-100 px-3 py-1 rounded-full text-sm">8 ta mashina</span>
        </div>
      </div>
    </section>

    <!-- Registration -->
    <section class="bg-white p-6 rounded-2xl shadow-md">
      <h2 class="text-xl font-bold text-gray-800 mb-4">Ro'yxatdan o'tish</h2>
      <input type="tel" placeholder="Mashina Raqami"
        class="w-full p-4 border-2 border-gray-200 rounded-xl mb-4 text-base focus:outline-none focus:border-blue-500 transition">
      <button
        class="w-full bg-gradient-to-r from-blue-500 to-green-500 hover:from-blue-600 hover:to-green-600 text-white font-bold py-4 rounded-xl shadow transition">
        Ro'yxatdan o'tish
      </button>
    </section>

  </div>

  <!-- Footer Navigation -->
  <footer class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 shadow-lg">
    <div class="max-w-4xl mx-auto flex justify-around py-3">
      <button class="flex flex-col items-center text-blue-500 gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
        <span class="text-xs font-medium">Navbat</span>
      </button>
      <button class="flex flex-col items-center text-gray-400 hover:text-green-500 gap-1 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <span class="text-xs font-medium">AЗС</span>
      </button>
      <button class="flex flex-col items-center text-gray-400 hover:text-indigo-500 gap-1 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        <span class="text-xs font-medium">Mening Navbat</span>
      </button>
    </div>
  </footer>

  <script>
    const stations = [
      { name: "Gaz Station 1", lat: 41.3716, lng: 69.3104 },
      { name: "Gaz Station 2", lat: 41.3650, lng: 69.3200 },
      { name: "Gaz Station 3", lat: 41.3780, lng: 69.2980 },
    ];

    function haversine(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    let nearestStation = null;
    let userLocation = null;

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude, longitude } = pos.coords;
        userLocation = { lat: latitude, lng: longitude };

        const distances = stations.map(s => ({
          ...s,
          dist: haversine(latitude, longitude, s.lat, s.lng)
        }));
        distances.sort((a, b) => a.dist - b.dist);
        nearestStation = distances[0];

        const min = nearestStation.dist;
        const driveMin = Math.round(min / 40 * 60);

        document.getElementById("nearest-dist").textContent =
          min < 1 ? `${Math.round(min * 1000)} m` : `${min.toFixed(1)} km`;
        document.getElementById("nearest-time").textContent = `~${driveMin} min`;
      }, () => {
        document.getElementById("nearest-dist").textContent = "?";
        document.getElementById("nearest-time").textContent = "?";
      });
    }

    document.getElementById("btn-nearest-azs").addEventListener("click", () => {
      if (nearestStation && userLocation) {
        const url = `https://www.google.com/maps/dir/${userLocation.lat},${userLocation.lng}/${nearestStation.lat},${nearestStation.lng}`;
        window.open(url, "_blank");
      } else if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const { latitude, longitude } = pos.coords;
          const distances = stations.map(s => ({
            ...s,
            dist: haversine(latitude, longitude, s.lat, s.lng)
          }));
          distances.sort((a, b) => a.dist - b.dist);
          const nearest = distances[0];
          const url = `https://www.google.com/maps/dir/${latitude},${longitude}/${nearest.lat},${nearest.lng}`;
          window.open(url, "_blank");
        }, () => alert("Geolokatsiya ruxsat berilmagan"));
      } else {
        alert("Brauzeringiz geolokatsiyani qo'llab-quvvatlamaydi");
      }
    });
  </script>
</body>

</html>
