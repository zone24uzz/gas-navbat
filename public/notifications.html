<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bildirishnomalar — GazQueue</title>
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body { padding-bottom: calc(var(--footer-h) + 16px); }
    .page-wrap { max-width: 640px; margin: 0 auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="header-inner" style="max-width:640px;margin:0 auto;width:100%;padding:0 16px;display:flex;align-items:center;gap:12px;">
      <a href="/" style="width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px;color:#fff" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <span style="color:#fff;font-weight:800;font-size:17px;flex:1;">Bildirishnomalar</span>
      <button id="btn-read-all" style="color:rgba(255,255,255,0.85);font-size:12px;font-weight:600;background:rgba(255,255,255,0.15);border:none;padding:7px 12px;border-radius:9px;cursor:pointer;">
        Barchasini o'qildi
      </button>
    </div>
  </header>

  <div class="page-wrap">

    <div id="empty-state" style="display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;">
      <div style="width:72px;height:72px;background:var(--surface2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;border:1.5px solid var(--border);">
        <svg xmlns="http://www.w3.org/2000/svg" style="width:32px;height:32px;color:var(--text3)" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
      </div>
      <p style="font-weight:700;color:var(--text);margin:0 0 6px;">Bildirishnomalar yo'q</p>
      <p style="color:var(--text3);font-size:13px;margin:0;">Navbatga yozilganda bu yerda ko'rinadi</p>
    </div>

    <div id="no-user-state" style="display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;">
      <div style="width:72px;height:72px;background:var(--accent-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
        <svg xmlns="http://www.w3.org/2000/svg" style="width:32px;height:32px;color:var(--accent)" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <p style="font-weight:700;color:var(--text);margin:0 0 6px;">Avval navbatga yoziling</p>
      <a href="/" class="btn-primary" style="margin-top:12px;padding:11px 24px;font-size:14px;border-radius:var(--radius-sm);text-decoration:none;">Bosh sahifaga</a>
    </div>

    <div id="notif-list" style="display:flex;flex-direction:column;gap:10px;"></div>

  </div>

  <footer class="app-footer">
    <a href="/" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      Navbat
    </a>
    <a href="/" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      AЗС
    </a>
    <button class="nav-item active">
      <svg xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
      Bildirishnomalar
    </button>
    <a href="/admin-login.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Admin
    </a>
  </footer>

  <script>
    const myUser = JSON.parse(sessionStorage.getItem('gazqueue_user') || 'null');
    const list   = document.getElementById('notif-list');
    const empty  = document.getElementById('empty-state');
    const noUser = document.getElementById('no-user-state');

    function timeAgo(iso) {
      const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (diff < 60) return 'Hozirgina';
      if (diff < 3600) return `${Math.floor(diff / 60)} daqiqa oldin`;
      if (diff < 86400) return `${Math.floor(diff / 3600)} soat oldin`;
      return new Date(iso).toLocaleDateString('uz-UZ');
    }

    function iconFor(body) {
      if (body.includes('✅')) return { bg: 'rgba(34,197,94,0.12)',  color: '#22c55e', emoji: '✅' };
      if (body.includes('🚗')) return { bg: 'rgba(79,110,247,0.12)', color: '#4f6ef7', emoji: '🚗' };
      if (body.includes('🎫')) return { bg: 'rgba(139,92,246,0.12)', color: '#8b5cf6', emoji: '🎫' };
      return { bg: 'var(--surface2)', color: 'var(--text3)', emoji: '🔔' };
    }

    function render(notifs) {
      if (!notifs || notifs.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'flex';
        return;
      }
      empty.style.display = 'none';
      list.innerHTML = notifs.map(n => {
        const ic = iconFor(n.body);
        return `
          <div style="display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:var(--radius-sm);background:${n.read ? 'var(--surface)' : 'var(--accent-bg)'};border:1.5px solid ${n.read ? 'var(--border)' : 'var(--accent)'};transition:background 0.2s;">
            <div style="width:42px;height:42px;border-radius:12px;background:${ic.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;">${ic.emoji}</div>
            <div style="flex:1;min-width:0;">
              <p style="font-weight:700;color:var(--text);font-size:14px;margin:0 0 3px;">${n.title}</p>
              <p style="color:var(--text2);font-size:13px;margin:0 0 5px;">${n.body}</p>
              <p style="color:var(--text3);font-size:11px;margin:0;">${timeAgo(n.time)}</p>
            </div>
            ${!n.read ? `<div style="width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px;"></div>` : ''}
          </div>`;
      }).join('');
    }

    if (!myUser) {
      noUser.style.display = 'flex';
    } else {
      fetch(`/api/notifications/${myUser.id}`).then(r => r.json()).then(render);
      // Poll for new notifications every 5 seconds
      setInterval(() => {
        fetch(`/api/notifications/${myUser.id}`).then(r => r.json()).then(render);
      }, 5000);
      document.getElementById('btn-read-all').addEventListener('click', async () => {
        await fetch(`/api/notifications/${myUser.id}/read-all`, { method: 'POST' });
        fetch(`/api/notifications/${myUser.id}`).then(r => r.json()).then(render);
      });
    }
  </script>
</body>
</html>
