<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AZS Admin kirish — GazQueue</title>
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="header-inner" style="max-width:640px;margin:0 auto;width:100%;padding:0 16px;">
      <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <div style="width:36px;height:36px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;">
          <span style="font-size:18px;">⛽</span>
        </div>
        <span style="color:#fff;font-weight:800;font-size:18px;">GazQueue</span>
      </a>
    </div>
  </header>

  <div class="center">
    <div style="width:100%;max-width:380px;">

      <div style="text-align:center;margin-bottom:28px;">
        <div style="width:68px;height:68px;background:linear-gradient(135deg,#f97316,#eab308);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 24px rgba(249,115,22,0.3);">
          <span style="font-size:32px;">⛽</span>
        </div>
        <h1 style="font-size:22px;font-weight:800;color:var(--text);margin:0 0 6px;">AZS Admin kirish</h1>
        <p style="color:var(--text3);font-size:13px;margin:0;">Zaправka xodimi uchun</p>
      </div>

      <div class="card" style="padding:24px;display:flex;flex-direction:column;gap:16px;">

        <div>
          <label style="display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;">Telefon raqam</label>
          <div style="display:flex;border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:border-color 0.2s;" onfocusin="this.style.borderColor='var(--accent)'" onfocusout="this.style.borderColor='var(--border)'">
            <div style="background:var(--surface2);border-right:1.5px solid var(--border);padding:0 14px;display:flex;align-items:center;font-size:13px;font-weight:700;color:var(--text2);white-space:nowrap;">🇺🇿 +998</div>
            <input type="tel" id="phone" placeholder="90 111 22 33" maxlength="12"
              style="flex:1;padding:13px 14px;font-size:14px;background:var(--surface);color:var(--text);border:none;outline:none;font-family:inherit;" />
          </div>
        </div>

        <div>
          <label style="display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;">Parol</label>
          <input type="password" id="password" placeholder="••••••••" class="input" />
        </div>

        <div id="login-error" style="display:none;background:rgba(239,68,68,0.08);border:1.5px solid rgba(239,68,68,0.2);color:#ef4444;font-size:13px;border-radius:var(--radius-sm);padding:12px 14px;">
          ❌ Telefon yoki parol noto'g'ri
        </div>

        <button id="login-btn" onclick="doLogin()" class="btn-primary" style="width:100%;padding:15px;font-size:15px;border-radius:var(--radius-sm);">
          Kirish
        </button>
      </div>

      <p style="text-align:center;margin-top:16px;">
        <a href="/" style="color:var(--text3);font-size:13px;text-decoration:none;">← Bosh sahifaga qaytish</a>
      </p>
    </div>
  </div>

  <script>
    if (sessionStorage.getItem('station_token')) location.href = '/station-admin.html';

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const phoneRaw = document.getElementById('phone').value.replace(/\s/g, '');
      const password = document.getElementById('password').value;
      const phone = '+998' + phoneRaw;
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');

      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Tekshirilmoqda...';

      try {
        const res = await fetch('/api/auth/station-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password })
        });
        const data = await res.json();
        if (!res.ok) { err.style.display = 'block'; return; }
        sessionStorage.setItem('station_token', data.token);
        sessionStorage.setItem('station_id', data.stationId);
        sessionStorage.setItem('station_name', data.stationName);
        location.href = '/station-admin.html';
      } catch {
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Kirish';
      }
    }
  </script>
</body>
</html>
